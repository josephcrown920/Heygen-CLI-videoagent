<!DOCTYPE html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildPro - Professional Construction Services</title>
    <meta name="description" content="Professional construction services for residential and commercial projects. Quality craftsmanship since 2010.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#1e3a5f;--primary-dark:#152a45;--secondary:#c9302c;--accent:#f4a261;--white:#fff;--gray-50:#f8fafc;--gray-200:#e2e8f0;--gray-600:#475569;--gray-900:#0f172a;--font-display:'Playfair Display',Georgia,serif;--font-body:'Inter',sans-serif;--shadow-lg:0 10px 15px -3px rgb(0 0 0 / 0.1);--shadow-xl:0 20px 25px -5px rgb(0 0 0 / 0.1)}
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{font-family:var(--font-body);line-height:1.6;color:var(--gray-900);overflow-x:hidden}
        img{max-width:100%;display:block}
        .loader{position:fixed;inset:0;background:var(--white);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
        .loader.hidden{opacity:0;pointer-events:none}
        .loader-spinner{width:50px;height:50px;border:4px solid var(--gray-200);border-top-color:var(--secondary);border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1rem 0;transition:all .3s}
        .header.scrolled{background:var(--white);box-shadow:var(--shadow-lg);padding:.5rem 0}
        .nav-container{max-width:1280px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between}
        .logo{display:flex;align-items:center;gap:.5rem;font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--white);text-decoration:none}
        .header.scrolled .logo{color:var(--primary)}
        .logo i{color:var(--secondary);font-size:1.75rem}
        .nav-menu{display:flex;align-items:center;gap:2rem;list-style:none}
        .nav-link{color:var(--white);text-decoration:none;font-weight:500;font-size:.875rem;position:relative;transition:color .3s}
        .header.scrolled .nav-link{color:var(--gray-900)}
        .nav-link::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--secondary);transition:width .3s}
        .nav-link:hover::after{width:100%}
        .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;font-size:.875rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-radius:.375rem;text-decoration:none;transition:all .3s;border:2px solid transparent;cursor:pointer}
        .btn-primary{background:var(--secondary);color:var(--white);border-color:var(--secondary)}
        .btn-primary:hover{background:#a02622;border-color:#a02622;transform:translateY(-2px);box-shadow:var(--shadow-lg)}
        .btn-outline{background:transparent;color:var(--white);border-color:var(--white)}
        .btn-outline:hover{background:var(--white);color:var(--primary)}
        .btn-lg{padding:1rem 2rem;font-size:1rem}
        .mobile-toggle{display:none;background:none;border:none;color:var(--white);font-size:1.5rem;cursor:pointer}
        .header.scrolled .mobile-toggle{color:var(--primary)}
        .hero{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(30,58,95,.92) 0%,rgba(30,58,95,.75) 100%),url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;color:var(--white);text-align:center}
        .hero-content{max-width:800px;padding:0 1.5rem}
        .hero-eyebrow{display:inline-block;font-size:.875rem;font-weight:600;text-transform:uppercase;letter-spacing:.2em;color:var(--accent);margin-bottom:1rem}
        .hero-title{font-family:var(--font-display);font-size:clamp(2.5rem,5vw,3.75rem);font-weight:700;line-height:1.1;margin-bottom:1.5rem}
        .hero-desc{font-size:1.25rem;opacity:.9;max-width:600px;margin:0 auto 2rem;line-height:1.7}
        .hero-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:4rem}
        .hero-stats{display:flex;justify-content:center;gap:3rem;flex-wrap:wrap}
        .hero-stat{text-align:center}
        .hero-stat .num{display:block;font-family:var(--font-display);font-size:3rem;font-weight:700;color:var(--accent);line-height:1}
        .hero-stat .label{font-size:.875rem;text-transform:uppercase;letter-spacing:.1em;opacity:.8}
        .section{padding:5rem 0}
        .section-alt{background:var(--gray-50)}
        .container{max-width:1280px;margin:0 auto;padding:0 1.5rem}
        .section-header{text-align:center;max-width:640px;margin:0 auto 3rem}
        .section-eyebrow{display:inline-block;font-size:.875rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--secondary);margin-bottom:.5rem}
        .section-title{font-family:var(--font-display);font-size:2.25rem;color:var(--primary);margin-bottom:1rem}
        .section-desc{color:var(--gray-600);font-size:1.125rem}
        .services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}
        .service-card{background:var(--white);padding:2rem;border-radius:.75rem;box-shadow:var(--shadow-lg);transition:all .3s;border-bottom:4px solid transparent}
        .service-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-xl);border-bottom-color:var(--secondary)}
        .service-icon{width:60px;height:60px;background:var(--primary);color:var(--white);border-radius:.5rem;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:1.5rem}
        .service-card h3{font-family:var(--font-display);font-size:1.25rem;color:var(--primary);margin-bottom:.75rem}
        .service-card p{color:var(--gray-600);font-size:.9375rem;line-height:1.7;margin-bottom:1rem}
        .service-link{color:var(--secondary);font-weight:600;font-size:.875rem;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem}
        .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
        .about-img-wrap{position:relative;border-radius:1rem;overflow:hidden;box-shadow:var(--shadow-xl)}
        .about-img-wrap img{width:100%}
        .exp-badge{position:absolute;bottom:-20px;right:-20px;background:var(--secondary);color:var(--white);padding:1.5rem;border-radius:.75rem;text-align:center;box-shadow:var(--shadow-xl);animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .exp-badge .years{display:block;font-family:var(--font-display);font-size:2.5rem;font-weight:700;line-height:1}
        .exp-badge span{font-size:.875rem;opacity:.9}
        .about-content .section-title{text-align:left}
        .about-text{color:var(--gray-600);margin-bottom:1.5rem;line-height:1.8}
        .feature-list{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:2rem}
        .feature-item{display:flex;align-items:center;gap:.5rem;font-weight:500;font-size:.9375rem}
        .feature-item i{color:var(--accent)}
        .stats{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);padding:4rem 0;color:var(--white)}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:2rem;text-align:center}
        .stat-item i{font-size:2.5rem;margin-bottom:1rem;color:var(--accent)}
        .stat-item .num{display:block;font-family:var(--font-display);font-size:3rem;font-weight:700;margin-bottom:.5rem}
        .stat-item .label{font-size:.875rem;text-transform:uppercase;letter-spacing:.1em;opacity:.9}
        .filter-btns{display:flex;justify-content:center;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap}
        .filter-btn{padding:.5rem 1.25rem;background:var(--white);border:2px solid var(--gray-200);border-radius:2rem;font-weight:500;color:var(--gray-600);cursor:pointer;transition:all .3s}
        .filter-btn:hover,.filter-btn.active{background:var(--primary);border-color:var(--primary);color:var(--white)}
        .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:1.5rem}
        .project-card{position:relative;border-radius:.75rem;overflow:hidden;aspect-ratio:4/3;cursor:pointer}
        .project-card img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
        .project-card:hover img{transform:scale(1.1)}
        .project-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(30,58,95,.95) 0%,transparent 60%);display:flex;flex-direction:column;justify-content:flex-end;padding:1.5rem;opacity:0;transition:opacity .3s}
        .project-card:hover .project-overlay{opacity:1}
        .project-cat{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent)}
        .project-title{font-family:var(--font-display);font-size:1.25rem;color:var(--white)}
        .testimonials-slider{position:relative;overflow:hidden;max-width:800px;margin:0 auto}
        .testimonials-track{display:flex;transition:transform .5s}
        .testimonial{flex:0 0 100%;padding:2rem;background:var(--white);border-radius:1rem;box-shadow:var(--shadow-lg)}
        .stars{color:var(--accent);margin-bottom:1rem}
        .testimonial-text{font-size:1.125rem;line-height:1.8;font-style:italic;margin-bottom:1.5rem}
        .testimonial-author{display:flex;align-items:center;gap:1rem}
        .author-avatar{width:50px;height:50px;border-radius:50%;object-fit:cover;border:3px solid var(--secondary)}
        .author-name{font-weight:700;color:var(--primary)}
        .author-title{font-size:.875rem;color:var(--gray-600)}
        .slider-controls{display:flex;justify-content:center;align-items:center;gap:1.5rem;margin-top:2rem}
        .slider-btn{width:40px;height:40px;border-radius:50%;background:var(--white);border:2px solid var(--gray-200);color:var(--primary);cursor:pointer;transition:all .3s}
        .slider-btn:hover{background:var(--secondary);border-color:var(--secondary);color:var(--white)}
        .slider-dots{display:flex;gap:.5rem}
        .dot{width:10px;height:10px;border-radius:50%;background:var(--gray-200);cursor:pointer;transition:all .3s}
        .dot.active{background:var(--secondary);transform:scale(1.2)}
        .cta{background:linear-gradient(135deg,var(--secondary) 0%,#a02622 100%);padding:5rem 0;color:var(--white);text-align:center}
        .cta-title{font-family:var(--font-display);font-size:2.5rem;margin-bottom:1rem}
        .cta-desc{font-size:1.125rem;opacity:.9;max-width:600px;margin:0 auto 2rem}
        .cta-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
        .btn-white{background:var(--white);color:var(--primary)}
        .btn-white:hover{background:var(--gray-100)}
        .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem}
        .contact-method{display:flex;align-items:flex-start;gap:1rem;padding:1rem;background:var(--white);border-radius:.5rem;margin-bottom:1rem;box-shadow:var(--shadow-lg);text-decoration:none;color:inherit;transition:all .3s}
        .contact-method:hover{transform:translateX(4px);box-shadow:var(--shadow-xl)}
        .method-icon{width:45px;height:45px;background:var(--primary);color:var(--white);border-radius:.5rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .method-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-600)}
        .method-value{font-weight:600;color:var(--primary)}
        .contact-form{background:var(--white);padding:2rem;border-radius:1rem;box-shadow:var(--shadow-xl)}
        .form-group{margin-bottom:1rem}
        .form-group label{display:block;font-size:.875rem;font-weight:500;margin-bottom:.5rem}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:.75rem;border:2px solid var(--gray-200);border-radius:.375rem;font-size:1rem;transition:border-color .3s}
        .form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .form-group textarea{min-height:120px;resize:vertical}
        .btn-full{width:100%;justify-content:center}
        .footer{background:var(--gray-900);color:var(--white);padding:4rem 0 2rem}
        .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem}
        .footer-brand p{color:var(--gray-400);line-height:1.7;margin:1rem 0}
        .social-links{display:flex;gap:.75rem}
        .social-links a{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:var(--white);text-decoration:none;transition:all .3s}
        .social-links a:hover{background:var(--secondary);transform:translateY(-3px)}
        .footer-links h4{font-size:1rem;margin-bottom:1rem;color:var(--accent)}
        .footer-links ul{list-style:none}
        .footer-links li{margin-bottom:.5rem}
        .footer-links a{color:var(--gray-400);text-decoration:none;font-size:.875rem;transition:color .3s}
        .footer-links a:hover{color:var(--white)}
        .footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:2rem;text-align:center;color:var(--gray-400);font-size:.875rem}
        .back-to-top{position:fixed;bottom:2rem;right:2rem;width:45px;height:45px;border-radius:50%;background:var(--secondary);color:var(--white);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transform:translateY(20px);transition:all .3s;z-index:999}
        .back-to-top.visible{opacity:1;visibility:visible;transform:translateY(0)}
        @media(max-width:968px){.about-grid,.contact-grid{grid-template-columns:1fr;gap:2rem}.about-img-wrap{order:-1;max-width:500px;margin:0 auto}.exp-badge{right:10px;bottom:-10px}.footer-grid{grid-template-columns:1fr 1fr}}
        @media(max-width:768px){.mobile-toggle{display:block}.nav-menu{position:fixed;top:0;right:-100%;width:80%;height:100vh;background:var(--white);flex-direction:column;padding:5rem 2rem;transition:right .3s;box-shadow:var(--shadow-xl)}.nav-menu.active{right:0}.nav-link{color:var(--gray-900);font-size:1.125rem}.hero-actions,.cta-actions{flex-direction:column}.hero-actions .btn,.cta-actions .btn{width:100%;justify-content:center}.feature-list,.form-row{grid-template-columns:1fr}.projects-grid{grid-template-columns:1fr}.footer-grid{grid-template-columns:1fr;text-align:center}.social-links{justify-content:center}}
    </style>
</head>
<body>
